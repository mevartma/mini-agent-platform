services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_agent_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      # Bind-mount source for hot reload — Dockerfile only installs deps
      - .:/app
      # Keep container's installed packages, don't override with host's .venv
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Browser-facing (client components)
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Server-facing (server components → internal Docker network)
      - API_URL=http://api:8000
      # Required for file-change detection inside Docker on macOS
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Bind-mount source for HMR
      - ./frontend:/app
      # Keep container's node_modules, don't override with host's
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
